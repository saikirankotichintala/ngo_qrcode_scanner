<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="ngo-logo.png">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<main class="page">
    <section class="card">
        <img class="logo" src="assets/logo.png" alt="Amarswaroop Foundation logo" onerror="this.style.display='none'">
        <h1>Admin Dashboard</h1>
        <p class="subtitle">Choose what you want to manage</p>

        <div class="nav-grid">
            <button id="goEmployee" type="button">Employee Registration</button>
            <button id="goProduct" type="button">Product Registration</button>
            <button id="goProductDetails" type="button" class="secondary">Product Details</button>
            <button id="goTeam" type="button" class="secondary">Employee &amp; Volunteer Details</button>
            <button id="goLogout" type="button" class="secondary">Logout</button>
        </div>
    </section>
</main>

<script src="js/config.js" defer></script>
<script src="js/admin.js" defer></script>
</body>
</html>
